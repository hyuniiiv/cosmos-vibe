name: Conformance

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  conformance:
    name: Filesystem contract (16 checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@quantum-agent.test"
          git config --global user.name "QuantumAgent CI"

      - name: Run conformance suite
        run: bash tests/conformance.sh

  cli-smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install CLI package
        working-directory: ./cli
        run: npm install
      - name: Help works
        working-directory: ./cli
        run: node index.js help

  mcp-smoke:
    name: MCP server smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install MCP package
        working-directory: ./mcp
        run: npm install
      - name: Sync skills
        working-directory: ./mcp
        run: npm run sync-skills
      - name: Server starts and responds to MCP handshake
        working-directory: ./mcp
        timeout-minutes: 1
        run: |
          # Send a minimal MCP initialize request over stdio and confirm a JSON-RPC response.
          REQ='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'
          echo "$REQ" | node index.js | head -c 200
