name: Publish to npm

on:
  push:
    tags:
      - 'v*'   # any tag like v1.0.1, v1.2.0

jobs:
  publish-mcp:
    name: Publish @hyuniiiv/quantum-agent-mcp
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Sync skills into package
        working-directory: ./mcp
        run: npm run sync-skills
      - name: Install
        working-directory: ./mcp
        run: npm install
      - name: Publish
        working-directory: ./mcp
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    name: Publish @hyuniiiv/quantum-agent-cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install
        working-directory: ./cli
        run: npm install
      - name: Publish
        working-directory: ./cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [publish-mcp, publish-cli]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\[" ver "\\]") found=1; next }
            found { print }
          ' CHANGELOG.md > release-notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "QuantumAgent $GITHUB_REF_NAME" \
            --notes-file release-notes.md
